<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stock FIFO V9 Test</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f7fa}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:8px;margin:5px}
</style>
</head>
<body>

<h2>Stock FIFO CPTE / ESS</h2>

<div class="card">
<h3>Produits</h3>
<button onclick="addProduct()">Ajouter produit</button>
<div id="products"></div>
</div>

<div class="card">
<h3>Commande fournisseur</h3>
<select id="prodSelect"></select>
<select id="soc">
<option value="cpte">CPTE</option>
<option value="ess">ESS</option>
</select>
<input id="qtyCmd" placeholder="Qté commandée">
<input id="priceCmd" placeholder="Prix">
<button onclick="createOrder()">Créer</button>
<div id="orders"></div>
</div>

<div class="card">
<h3>Réception</h3>
<select id="orderSelect"></select>
<input id="qtyRec" placeholder="Qté reçue">
<button onclick="receive()">Réceptionner</button>
</div>

<div class="card">
<h3>Sortie stock</h3>
<select id="prodOut"></select>
<select id="socOut">
<option value="cpte">CPTE</option>
<option value="ess">ESS</option>
</select>
<input id="qtyOut" placeholder="Qté">
<button onclick="consume()">Sortie FIFO</button>
</div>

<div class="card">
<h3>Stock actuel</h3>
<div id="stock"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("stockV9")) || {
products:[],
orders:[],
id:1
};

function save(){
localStorage.setItem("stockV9", JSON.stringify(data));
render();
}

function addProduct(){
let name = prompt("Nom produit");
if(!name) return;
data.products.push({
id:data.id++,
name,
cpteLots:[],
essLots:[]
});
save();
}

function createOrder(){
let pid = prodSelect.value;
let soc = soc.value;
let qty = parseFloat(qtyCmd.value);
let price = parseFloat(priceCmd.value);

data.orders.push({
id:data.id++,
productId:pid,
soc,
qtyOrdered:qty,
qtyReceived:0,
price,
status:"pending"
});
save();
}

function receive(){
let oid = orderSelect.value;
let order = data.orders.find(o=>o.id==oid);
let qty = parseFloat(qtyRec.value);

if(order.qtyReceived + qty > order.qtyOrdered){
alert("Trop reçu");
return;
}

order.qtyReceived += qty;
order.status = order.qtyReceived == order.qtyOrdered ? "done" : "partial";

let p = data.products.find(p=>p.id==order.productId);

let lot = {qty, price:order.price};

if(order.soc=="cpte") p.cpteLots.push(lot);
if(order.soc=="ess") p.essLots.push(lot);

save();
}

function consume(){
let pid = prodOut.value;
let soc = socOut.value;
let qty = parseFloat(qtyOut.value);

let p = data.products.find(p=>p.id==pid);
let lots = soc=="cpte" ? p.cpteLots : p.essLots;

while(qty > 0 && lots.length){
let l = lots[0];
if(l.qty <= qty){
qty -= l.qty;
lots.shift();
}else{
l.qty -= qty;
qty = 0;
}
}

if(qty>0) alert("Stock insuffisant");

save();
}

function render(){

prodSelect.innerHTML = data.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
prodOut.innerHTML = prodSelect.innerHTML;

orderSelect.innerHTML = data.orders.map(o=>`<option value="${o.id}">CMD ${o.id}</option>`).join('');

orders.innerHTML = data.orders.map(o=>{
return `CMD ${o.id} - ${o.qtyReceived}/${o.qtyOrdered} (${o.status})`;
}).join("<br>");

products.innerHTML = data.products.map(p=>p.name).join("<br>");

stock.innerHTML = data.products.map(p=>{
let cpte = p.cpteLots.reduce((s,l)=>s+l.qty,0);
let ess = p.essLots.reduce((s,l)=>s+l.qty,0);
return `${p.name} → CPTE: ${cpte} | ESS: ${ess}`;
}).join("<br>");

}

render();

</script>

</body>
</html>
